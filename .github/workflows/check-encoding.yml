name: Check UTF-8 Encoding

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-encoding:
    runs-on: ubuntu-latest
    name: Detect mojibake / encoding corruption

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for mojibake in HTML and JS files
        run: |
          # Mojibake = UTF-8 multibyte sequences stored as Latin-1 codepoints
          # In raw bytes: valid UTF-8 file should NOT have 0xC2-0xEF followed by 0x80-0xBF
          # when the declared charset is UTF-8 (these appear as â Â Ã characters).
          # We use grep -P to search for the pattern in files declared as UTF-8.
          
          FAILED=0
          for FILE in index.html main.js style.css; do
            [ -f "$FILE" ] || continue
            
            # Count sequences: byte 0xC2-0xEF followed by 0x80-0xBF  
            # In a valid UTF-8 HTML file these would be legitimate multibytes.
            # But if the file also contains literal â (U+00E2 = 0xE2 in Latin-1)
            # followed by low bytes, it means double-encoding occurred.
            # Simpler: just grep for the literal mojibake character sequences.
            
            COUNT=$(grep -Pc '[\xc2-\xef][\x80-\xbf]' "$FILE" || true)
            if [ "$COUNT" -gt "0" ]; then
              echo "ERROR: $FILE has $COUNT line(s) with mojibake sequences!"
              grep -Pn '[\xc2-\xef][\x80-\xbf]' "$FILE" | head -5
              FAILED=1
            else
              echo "OK: $FILE"
            fi
          done
          
          if [ "$FAILED" -ne "0" ]; then
            echo ""
            echo "Fix: Save your files with UTF-8 encoding."
            echo "VS Code: click encoding in status bar -> Save with Encoding -> UTF-8"
            exit 1
          fi
          echo "All files passed encoding check!"
