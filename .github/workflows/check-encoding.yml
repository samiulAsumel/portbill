name: Check UTF-8 Encoding

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-encoding:
    runs-on: ubuntu-latest
    name: Detect mojibake / encoding corruption

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check HTML and JS files for mojibake characters
        run: |
          python3 -c "
import re, sys, os

# Mojibake pattern: Latin-1 surrogate bytes stored as Unicode codepoints
# e.g. U+00E2 U+0080 U+0094 instead of proper U+2014 (em dash)
pattern = re.compile(r'[\xc2-\xef][\x80-\xbf]+')

files = ['index.html', 'main.js', 'style.css']
found = False

for filepath in files:
    if not os.path.isfile(filepath):
        continue
    with open(filepath, 'r', encoding='utf-8') as f:
        content = f.read()
    matches = pattern.findall(content)
    if matches:
        found = True
        print(f'ERROR: {filepath} has {len(matches)} mojibake sequence(s)!')
        for m in matches[:3]:
            idx = content.find(m)
            line_no = content[:idx].count(chr(10)) + 1
            try:
                fixed = m.encode('latin-1').decode('utf-8')
            except Exception:
                fixed = '?'
            print(f'  Line {line_no}: {repr(m)} -> should be {repr(fixed)}')
    else:
        print(f'OK: {filepath}')

if found:
    print()
    print('FIX: Save files with UTF-8 encoding in your editor.')
    print('VS Code: click encoding in status bar -> Save with Encoding -> UTF-8')
    sys.exit(1)
"
